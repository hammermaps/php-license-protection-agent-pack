; ============================================================
; MMProtect Loader — php.ini configuration
; ============================================================
;
; IMPORTANT load order: opcache MUST appear before mmloader so that
; mmloader is the outermost compile hook (decrypts first on cache miss):
;
;   zend_extension=opcache.so           ← first
;   zend_extension=/path/to/mmloader.so ← second
;
; Linux example:
;   zend_extension=/usr/lib/php/20240924/mmloader.so
; Windows example:
;   zend_extension=C:\php\ext\php_mmloader.dll

mmloader.enabled=1

; URL of the license server (base URL — loader appends /api/v1/runtime/lease)
mmloader.license_server=https://license.example.com

; Absolute paths to the project's mmprotect metadata files.
; Do NOT use relative paths — resolution is CWD-dependent.
mmloader.manifest_file=/var/www/html/.mmprotect/manifest.json
mmloader.license_file=/var/www/html/.mmprotect/license.json

; Path to the vendor ECDSA-P256 public key (PEM, SubjectPublicKeyInfo format)
; Obtain from the software vendor who encoded your PHP files.
mmloader.signing_public_key_file=/etc/mmprotect/signing-public.pem

; Directory for disk-based lease cache (must be writable by the PHP process, mode 0700)
mmloader.cache_dir=/var/cache/mmloader

mmloader.connect_timeout_ms=3000
mmloader.request_timeout_ms=5000
mmloader.lease_refresh_seconds=3600
mmloader.offline_grace_seconds=604800

; ECDSA-P256 signature verification (required for production builds)
mmloader.require_signature=1

mmloader.protected_magic=MMENC1

; ---- Error Reporting (optional) ----
;
; Sends PHP errors/warnings from the customer server back to the license server,
; where they appear under GET /api/v1/admin/error-reports for the developer.
; Only errors from requests that have an active MMProtect lease are reported.
; Default: disabled.
;
; mmloader.error_reporting=0
;
; URL to POST the error batch to. Defaults to:
;   <mmloader.license_server>/api/v1/runtime/errors
; Override only if the error-reporting endpoint is on a different host.
;
; mmloader.error_report_url=
;
; Maximum number of errors to collect per request (default: 20).
; mmloader.error_report_max_per_request=20
;
; Bitmask of PHP error levels to report (default: 32767 = E_ALL).
; E_ERROR=1, E_WARNING=2, E_PARSE=4, E_NOTICE=8, E_USER_ERROR=256,
; E_USER_WARNING=512, E_USER_NOTICE=1024, E_DEPRECATED=8192 etc.
; Example — only errors and warnings: 3
; mmloader.error_report_level=32767

; ---- Telemetry (optional) ----
;
; Sends lease-lifecycle events (lease_acquired, lease_offline_grace) from the
; PHP extension back to the license server. These are non-sensitive operational
; metrics (no buildKey, no runtimeKey, no source code). Useful for the developer
; to monitor deployment health per license.
; Default: disabled.
;
; mmloader.telemetry=0
;
; URL to POST telemetry events to. Defaults to:
;   <mmloader.license_server>/api/v1/telemetry/loader
; Override only if the telemetry endpoint is on a different host.
;
; mmloader.telemetry_url=

; ---- Development-only settings (REMOVE FOR PRODUCTION) ----
; These settings are only available in dev builds (compiled with --enable-mmloader-dev).
; They have NO EFFECT in release builds.
;
; mmloader.dev_mode=1
;   Skips the license server and uses a local build key file instead.
;
; mmloader.dev_buildkey=/var/www/html/.mmprotect/dev-buildkey.b64
;   Path to the Base64-encoded 32-byte build key written by the encoder
;   when using --dev mode (mmencoder encode-dir --dev ...).
